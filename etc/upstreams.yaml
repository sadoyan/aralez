  #          - "127.0.0.1:8000"
  ara.matyan.org:
    paths:
      "/":
        servers:
          - "127.0.0.1:8000"
      "/.well-known/acme-challenge":
        healthcheck: false
        servers:
          - "127.0.0.1:3000"
