[target.aarch64-unknown-linux-musl]
rustflags = [
    "-C", "link-arg=-Wl,--defsym=fopen64=fopen",
    "-C", "link-arg=-Wl,--defsym=fseeko64=fseeko",
    "-C", "link-arg=-Wl,--defsym=ftello64=ftello"
]

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "link-arg=-Wl,--defsym=fopen64=fopen",
    "-C", "link-arg=-Wl,--defsym=fseeko64=fseeko",
    "-C", "link-arg=-Wl,--defsym=ftello64=ftello"
]
